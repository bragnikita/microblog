on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - ".gitignore"
      - "README.md"
permissions:
  id-token: write
  contents: read
jobs:

  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'Production' || 'Staging' }}
    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      SST_STAGE_NAME: ${{ github.ref_name == 'master' && 'prod' || 'stg' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - run: echo '${{ env.AWS_ROLE_ARN }} | ${{ env.AWS_REGION }}'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production
        env:
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
          FAST_ACCESS_KEY: ${{ secrets.FAST_ACCESS_KEY }}
          APP_DOMAIN: ${{ env.APP_DOMAIN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          NODE_ENV: production
        run: |
          echo "Deploying to production..."
          pnpm sst:deploy --stage ${{ env.SST_STAGE_NAME }}

